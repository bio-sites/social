<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>حساباتي الشخصية - مدير الروابط</title>
    <link rel="stylesheet" href="style.css">
    <!-- Firebase SDKs -->
    <script type="module" src="firebase-config.js"></script>
</head>
<body>
    <div class="auth-container" id="authContainer">
        <h2>تسجيل الدخول أو إنشاء حساب</h2>
        <form id="authForm">
            <input type="email" id="email" placeholder="البريد الإلكتروني" required>
            <input type="password" id="password" placeholder="كلمة المرور" required>
            <button type="submit" id="loginBtn">تسجيل الدخول</button>
            <button type="button" id="signupBtn">إنشاء حساب جديد</button>
        </form>
        <div id="authMessage"></div>
    </div>

    <div class="app-container" id="appContainer" style="display:none;">
        <header>
            <h1>📱 حساباتي الشخصية</h1>
            <button id="logoutBtn">تسجيل خروج</button>
            <button id="shareBtn" style="background-color:#28a745;">🔗 مشاركة ملفي الشخصي</button>
        </header>
        <div class="add-form">
            <h3>إضافة حساب جديد</h3>
            <input type="text" id="platform" placeholder="اسم المنصة (مثل Twitter)" required>
            <input type="text" id="username" placeholder="اسم المستخدم" required>
            <input type="url" id="url" placeholder="الرابط (https://...)" required>
            <button id="addAccountBtn">➕ إضافة</button>
        </div>
        <div id="accountsList">
            <!-- ستظهر الحسابات هنا ديناميكياً -->
        </div>
    </div>

    <script type="module" src="app.js"></script>
</body>
</html>
