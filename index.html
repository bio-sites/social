<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>حساباتي الشخصية - مدير الروابط</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- نموذج تسجيل الدخول وإنشاء حساب -->
<div class="auth-container" id="authContainer">
    <h2>تسجيل الدخول أو إنشاء حساب</h2>
    <form id="authForm">
        <input type="text" id="signupName" placeholder="الاسم الذي سيظهر في صفحتك العامة" style="display:none;">
        <input type="email" id="email" placeholder="البريد الإلكتروني" required>
        <input type="password" id="password" placeholder="كلمة المرور" required>
        <button type="button" id="loginBtn">تسجيل الدخول</button>
        <button type="button" id="showSignupBtn" style="background-color:#28a745;">إنشاء حساب جديد</button>
    </form>
    <div id="authMessage"></div>
</div>

    <!-- الواجهة الرئيسية بعد تسجيل الدخول -->
    <div class="app-container" id="appContainer" style="display:none;">
        <header>
            <h1>📱 حسابات <span id="profileName">...</span></h1>
            <div>
                <button id="editProfileBtn" style="background-color:#ffc107; color:#333;">✏️ تعديل الاسم</button>
                <button id="logoutBtn" style="background-color:#dc3545;">تسجيل خروج</button>
                <button id="shareBtn" style="background-color:#28a745;">🔗 مشاركة ملفي الشخصي</button>
            </div>
        </header>
        
        <div class="add-form">
            <h3>➕ إضافة حساب جديد</h3>
            <input type="text" id="platform" placeholder="اسم المنصة (مثل Twitter)" required>
            <input type="text" id="username" placeholder="اسم المستخدم في المنصة" required>
            <input type="url" id="url" placeholder="الرابط (https://...)" required>
            <button id="addAccountBtn">إضافة</button>
        </div>
        
        <div id="accountsList"></div>
    </div>

    <script type="module" src="firebase-config.js"></script>
    <script type="module" src="app.js"></script>
</body>
</html>
